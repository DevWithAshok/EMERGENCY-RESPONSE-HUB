<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Hub | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .map-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        .alert-flash { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="p-6 grid grid-cols-12 gap-6">
        <div class="col-span-12 flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-bold text-sky-500">EMERGENCY COMMAND HUB</h1>
            <div id="clock" class="text-sm font-mono text-slate-400">00:00:00</div>
        </div>

        <div class="col-span-3 space-y-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <h3 class="text-sm uppercase text-slate-500 font-bold mb-4">Hospital Bed Vacancy</h3>
                <div id="hospital-list" class="space-y-3">
                    <div class="flex justify-between bg-slate-800 p-2 rounded"><span>City General</span><span class="text-emerald-400 font-bold">12 Beds</span></div>
                </div>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <h3 class="text-sm uppercase text-slate-500 font-bold mb-4">Blood Inventory</h3>
                <div class="grid grid-cols-4 gap-2">
                    <div class="text-center p-2 bg-slate-800 rounded">O+<div class="text-xs text-rose-500">4</div></div>
                    <div class="text-center p-2 bg-slate-800 rounded">B+<div class="text-xs text-emerald-500">12</div></div>
                </div>
            </div>
        </div>

        <div class="col-span-6 h-[500px] bg-slate-900 rounded-xl border border-slate-800 relative overflow-hidden">
            <div id="map-area" class="w-full h-full relative z-0"></div>
        </div>


        

        <!-- RIGHT: DISPATCH -->
        <div class="col-span-3 space-y-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <h3 class="text-sm uppercase text-slate-500 font-bold mb-4">Dispatch Center</h3>
		<div class="flex flex-col gap-3 p-4 bg-slate-800 rounded-lg border border-slate-700">
    <h3 class="text-xs text-slate-400 font-bold uppercase">Manual Routing</h3>
    <input type="text" id="start-coords" placeholder="Start: Lat, Lon" class="p-2 bg-slate-900 border border-slate-700 rounded text-sm text-white">
    <input type="text" id="end-coords" placeholder="End: Lat, Lon" class="p-2 bg-slate-900 border border-slate-700 rounded text-sm text-white">
    <button onclick="dispatchManual()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded text-sm transition">
        CALCULATE & DISPATCH
    </button>

    <div id="route-info" class="hidden flex flex-col gap-1 mt-2 p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm">
        <div class="flex justify-between items-center">
            <span class="text-slate-400 font-medium">Distance:</span>
            <span id="route-distance" class="text-sky-400 font-bold">0 km</span>
        </div>
        <div class="flex justify-between items-center">
            <span class="text-slate-400 font-medium">Est. Time:</span>
            <span id="route-time" class="text-emerald-400 font-bold">0 mins</span>
        </div>
    </div>
    
</div>
                <button onclick="dispatchAmbulance()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-lg font-bold">DISPATCH NEAREST</button>
            </div>
        </div>
<div>
	<a href="index.html" style="position: absolute; bottom: 15px; left: 15px; background-color: #2c3e50; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-family: sans-serif; font-size: 14px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 9999;">← Back to Hub</a>
</div>

    </div>

    <script>
        let liveMap;
        let ambulanceMarker;
        let currentRouteLayer = null; 

        function initMap() {
            liveMap = L.map('map-area').setView([37.7749, -122.4194], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(liveMap);

            const ambIcon = L.divIcon({
                className: 'bg-red-600 rounded-full w-4 h-4 shadow-[0_0_15px_rgba(220,38,38,0.8)] animate-pulse',
                iconSize: [16, 16]
            });
            ambulanceMarker = L.marker([37.7749, -122.4194], {icon: ambIcon});
        }

        function updateClock() { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
        }
        setInterval(updateClock, 1000);
        
        async function loadHospitals() {
            try {
                const response = await fetch("http://localhost:8000/api/hospitals");
                const data = await response.json();
                const hospitalList = document.getElementById("hospital-list");
                hospitalList.innerHTML = ""; 
                
                if (Array.isArray(data) && data.length > 0) {
                    data.forEach(hospital => {
                        const statusBadge = hospital.is_verified 
                            ? `<span class="text-[10px] uppercase font-bold bg-emerald-900/50 text-emerald-400 px-2 py-1 rounded border border-emerald-700">✓ Verified</span>`
                            : `<span class="text-[10px] uppercase font-bold bg-slate-700/50 text-slate-400 px-2 py-1 rounded border border-slate-600 animate-pulse">⚠ Unverified</span>`;

                        hospitalList.innerHTML += `
                            <div class="flex flex-col bg-slate-800 p-3 rounded-lg border border-slate-700 gap-3 shadow-sm">
                                <div class="flex justify-between items-start">
                                    <span class="font-semibold text-slate-200 tracking-wide">${hospital.name}</span>
                                    ${statusBadge}
                                </div>
                                <div class="flex justify-between items-center bg-slate-900 p-2 rounded">
                                    <span class="text-xs text-slate-400 font-medium">ICU BEDS</span>
                                    <span class="text-emerald-400 font-bold text-lg">${hospital.icu_beds_available}</span>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) { console.error("Error loading hospitals:", error); }
        }

        async function dispatchAmbulance() {
            const btn = document.querySelector('button[onclick="dispatchAmbulance()"]');
            btn.innerText = "SCANNING...";
            try {
                const response = await fetch("http://localhost:8000/api/book-ambulance", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: "Command_Center", pickup_location: { latitude: 37.7749, longitude: -122.4194 } })
                });
                const data = await response.json();
                if (response.ok) {
                    alert(data.message);
                    const ws = new WebSocket(`ws://localhost:8000/ws/listen/${data.room_id}`);
                    ws.onopen = () => ambulanceMarker.addTo(liveMap);
                    ws.onmessage = (event) => {
                        const loc = JSON.parse(event.data);
                        ambulanceMarker.setLatLng([loc.lat, loc.lon]);
                        liveMap.panTo([loc.lat, loc.lon]);
                    };
                }
            } catch (e) { alert("Dispatch Failed"); }
            finally { btn.innerText = "DISPATCH NEAREST"; }
        }

        async function dispatchManual() {
            const startCity = document.getElementById('start-coords').value;
            const endCity = document.getElementById('end-coords').value;

            const getCoords = async (city) => {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
                const data = await response.json();
                if (data.length === 0) throw new Error(`Location not found: ${city}`);
                return { lat: data[0].lat, lon: data[0].lon };
            };

            try {
                const start = await getCoords(startCity);
                const end = await getCoords(endCity);

                // Fetch route from OSRM
                const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${start.lon},${start.lat};${end.lon},${end.lat}?geometries=geojson`;
                const osrmResponse = await fetch(osrmUrl);
                const osrmData = await osrmResponse.json();

                if (!osrmData.routes || osrmData.routes.length === 0) {
                    throw new Error("Could not calculate road route.");
                }
                
                const routeInfo = osrmData.routes[0];
                const roadPoints = routeInfo.geometry.coordinates;
                
                const distanceKm = (routeInfo.distance / 1000).toFixed(1);
                const timeMins = Math.ceil(routeInfo.duration / 60);

                const response = await fetch("http://localhost:8000/api/green-corridor", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        driver_id: "D1",
                        start_lat: parseFloat(start.lat), start_lon: parseFloat(start.lon),
                        end_lat: parseFloat(end.lat), end_lon: parseFloat(end.lon)
                    })
                });
                
                const data = await response.json();
                
                if (data.status === "Green Corridor Activated") {
                    if (currentRouteLayer) liveMap.removeLayer(currentRouteLayer);

                    const latlngs = roadPoints.map(coord => [coord[1], coord[0]]);
                    currentRouteLayer = L.polyline(latlngs, {color: '#3b82f6', weight: 6}).addTo(liveMap);
                    liveMap.fitBounds(currentRouteLayer.getBounds());
                    
                    document.getElementById('route-distance').innerText = `${distanceKm} km`;
                    document.getElementById('route-time').innerText = `${timeMins} min`;
                    document.getElementById('route-info').classList.remove('hidden');
                    
                    alert("Route Calculated: " + startCity + " to " + endCity);
                }
            } catch (error) { alert("Error: " + error.message); }
        }
        
        window.onload = function() {
            updateClock();
            loadHospitals();
            setInterval(loadHospitals, 3000);
            initMap();
        };
    </script>
</body>
</html>
